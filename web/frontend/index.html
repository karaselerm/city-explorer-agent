<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityExplorer Agent</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel panel-form">
        <header>
          <p class="eyebrow">Бонусный трек PoC</p>
          <h1>CityExplorer Agent</h1>
        </header>

        <form id="plan-form">
          <div class="grid">
            <label>
              ID пользователя
              <input name="user_id" value="demo_user" required />
            </label>

            <label>
              Город (любой)
              <input name="city" value="Moscow" required />
            </label>

            <label>
              Длительность (ч)
              <input name="duration_hours" type="number" min="1" max="12" step="0.5" value="3" />
            </label>

            <label>
              Макс. расстояние (км)
              <input name="max_distance_km" type="number" min="1" max="80" step="0.5" value="6" />
            </label>

            <label>
              Стиль маршрута
              <select name="style">
                <option value="balanced">Сбалансированный</option>
                <option value="culture">Культурный</option>
                <option value="nature">Природный</option>
              </select>
            </label>

            <label>
              Бюджет
              <select name="budget">
                <option value="low">Низкий</option>
                <option value="medium" selected>Средний</option>
                <option value="high">Высокий</option>
              </select>
            </label>

            <label>
              Режим перемещения
              <select name="transport_mode">
                <option value="walk">Пешком</option>
                <option value="bike">Велосипед</option>
                <option value="car">Машина</option>
                <option value="transit">Общественный транспорт</option>
              </select>
            </label>
          </div>

          <section class="category-box">
            <h3>Обязательные категории</h3>
            <div id="must-category-list" class="chips"></div>
            <label>
              Другое (через запятую)
              <input name="must_categories_custom" value="" placeholder="например: botanical_garden, zoo" />
            </label>
          </section>

          <section class="category-box">
            <h3>Нежелательные категории</h3>
            <div id="avoid-category-list" class="chips"></div>
            <label>
              Другое (через запятую)
              <input name="avoid_categories_custom" value="" placeholder="например: bar,hookah" />
            </label>
          </section>

          <div class="toggles">
            <label><input type="checkbox" name="quiet" /> Тихие места</label>
            <label><input type="checkbox" name="with_plan_b" checked /> Запасной план</label>
            <label><input type="checkbox" name="export_ics" /> Экспорт в ICS</label>
            <label><input type="checkbox" name="confirm_side_effects" /> Подтверждаю экспорт</label>
          </div>

          <button type="submit" id="submit-btn">Собрать маршрут</button>
        </form>

        <p id="status" class="status">Готово к запуску.</p>
      </section>

      <section class="panel panel-result">
        <div id="summary" class="summary hidden"></div>
        <div id="warnings" class="warnings hidden"></div>
        <div id="city-hints" class="city-hints hidden"></div>
        <div id="map" class="map"></div>
        <div id="stops" class="stops"></div>
        <div id="trace" class="trace"></div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/app.js" defer></script>
  </body>
</html>
