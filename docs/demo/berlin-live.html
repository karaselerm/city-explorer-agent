<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityExplorer Demo — Berlin</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="wrap">
      <p><a href="./">← К списку примеров</a></p>
      <h1 id="title">Загрузка...</h1>

      <section class="card">
        <h2>Параметры запроса</h2>
        <div id="request"></div>
      </section>

      <section class="card">
        <h2>Сводка</h2>
        <div id="summary"></div>
      </section>

      <section class="card">
        <h2>Предупреждения</h2>
        <div id="warnings"></div>
      </section>

      <section class="card">
        <h2>Маршрут</h2>
        <div id="stops"></div>
      </section>

      <p id="status"></p>
    </main>

    <script>
      window.DEMO_DATA_FILE = "./data/berlin-live.json";
    </script>
    <script src="./viewer.js"></script>
  </body>
</html>
